name: Build/Release

on:
  push:
    branches:
      - "**"
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

jobs:
  build-macos:
    name: Build for macOS
    runs-on: macos-latest
    permissions:
      contents: read
      actions: write
    steps:
      - uses: actions/checkout@v7
      - run: brew install xmake m4 automake autoconf libtool
      - run: |
          xmake f -m release -a arm64 --target_minver=11.0 -y && xmake
          xmake f -m release -a x86_64 --target_minver=10.6 -y && xmake
          lipo -create build/macosx/arm64/release/PanicInfoReader build/macosx/x86_64/release/PanicInfoReader -output PanicInfoReader-macosx-universal
      - uses: actions/upload-artifact@v7
        with:
          name: macosx-universal
          path: PanicInfoReader-macosx-universal
          if-no-files-found: 'error'
      - run: |
          xmake f -m debug -a arm64 --target_minver=11.0 -y && xmake
          xmake f -m debug -a x86_64 --target_minver=10.6 -y && xmake
          lipo -create build/macosx/arm64/debug/PanicInfoReader build/macosx/x86_64/debug/PanicInfoReader -output PanicInfoReader-macosx-universal-debug
      - uses: actions/upload-artifact@v7
        with:
          name: macosx-universal-debug
          path: PanicInfoReader-macosx-universal-debug
          if-no-files-found: 'error'

  build-linux:
    name: Build for Linux
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write
    steps:
      - uses: actions/checkout@v7
      - run: |
          sudo apt-get update
          sudo apt-get install -y xmake m4 automake autoconf libtool
      - run: |
          xmake f -m release -y && xmake
          cp build/linux/x86_64/release/PanicInfoReader PanicInfoReader-linux-x86_64
      - uses: actions/upload-artifact@v7
        with:
          name: linux-x86_64
          path: PanicInfoReader-linux-x86_64
          if-no-files-found: 'error'
      - run: |
          xmake f -m debug -y && xmake
          cp build/linux/x86_64/debug/PanicInfoReader PanicInfoReader-linux-x86_64-debug
      - uses: actions/upload-artifact@v7
        with:
          name: linux-x86_64-debug
          path: PanicInfoReader-linux-x86_64-debug
          if-no-files-found: 'error'

  build-windows:
    name: Build for Windows
    runs-on: windows-latest
    permissions:
      contents: read
      actions: write
    steps:
      - uses: actions/checkout@v7
      - uses: xmake-io/github-action-setup-xmake@v1
        with:
          xmake-version: latest
      - run: |
          xmake f -m release -y && xmake
          cp build/windows/x64/release/PanicInfoReader.exe PanicInfoReader-x86_64.exe
      - uses: actions/upload-artifact@v7
        with:
          name: windows-x86_64
          path: PanicInfoReader-x86_64.exe
          if-no-files-found: 'error'
      - run: |
          xmake f -m debug -y && xmake
          cp build/windows/x64/debug/PanicInfoReader.exe PanicInfoReader-x86_64-debug.exe
      - uses: actions/upload-artifact@v7
        with:
          name: windows-x86_64-debug
          path: PanicInfoReader-x86_64-debug.exe
          if-no-files-found: 'error'

  build-bsd:
    name: Build for BSD
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write
    steps:
      - uses: actions/checkout@v7
      - uses: vmactions/freebsd-vm@v1
        with:
          usesh: true
          prepare: |
            pkg install -y m4 automake autoconf libtool curl bash gmake
            curl -fsSL https://xmake.io/shget.text | prefix=/usr/local bash
          run: |
            export XMAKE_ROOT=y
            xmake f -m release -y && xmake
            cp build/bsd/x86_64/release/PanicInfoReader PanicInfoReader-bsd-x86_64
            xmake f -m debug -y && xmake
            cp build/bsd/x86_64/debug/PanicInfoReader PanicInfoReader-bsd-x86_64-debug
      - uses: actions/upload-artifact@v7
        with:
          name: bsd-x86_64
          path: PanicInfoReader-bsd-x86_64
          if-no-files-found: 'error'
      - uses: actions/upload-artifact@v7
        with:
          name: bsd-x86_64-debug
          path: PanicInfoReader-bsd-x86_64-debug
          if-no-files-found: 'error'

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: [build-macos, build-linux, build-bsd, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
      - uses: actions/download-artifact@v8
        with:
          path: artifacts/
          merge-multiple: true
      - name: Upload build
        run: |
          shopt -s nullglob
          files=(artifacts/*)
          [ ${#files[@]} -gt 0 ] || { echo "No files found"; exit 1; }
          NOTES=$(awk '/^## '"${{ github.ref_name }}"'$/{flag=1; next} /^## v/{flag=0} flag' CHANGELOG.md | sed 's/^### /## /')

          [ -n "$NOTES" ] || {
            echo "No changelog entry found for ${{ github.ref_name }}"
            exit 1
          }

          echo "$NOTES" | gh release create "${{ github.ref_name }}" "${files[@]}" \
            -t "${{ github.ref_name }}" \
            --verify-tag \
            --fail-on-no-commits \
            --discussion-category Announcements \
            -F -
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
